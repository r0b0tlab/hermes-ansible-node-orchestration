---
name: CI

on:
  push:
  pull_request:

jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml --collections-path .ansible/collections

      - name: Validate example inventory and playbooks
        run: ./scripts/validate-inventory.sh inventories/examples/three-node-gb10.yml
